name: ClearSpend
options:
  bundleIdPrefix: com.clearspend
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "4.0"
    CURRENT_PROJECT_VERSION: "3"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSCameraUsageDescription: "ClearSpend uses your camera to scan receipts"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "ClearSpend uses your microphone for voice input"
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "ClearSpend uses speech recognition to transcribe your voice input"
    INFOPLIST_KEY_CFBundleURLTypes:
      - CFBundleURLSchemes:
        - clearspend
    GENERATE_INFOPLIST_FILE: true

targets:
  ClearSpend:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clearspend.tomorin.app
        INFOPLIST_KEY_CFBundleDisplayName: ClearSpend
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "iPhone Developer"
        "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": ""
        DEVELOPMENT_TEAM: 776XFU3GK7
        CODE_SIGN_ENTITLEMENTS: ClearSpend.entitlements
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []

schemes:
  ClearSpend:
    build:
      targets:
        ClearSpend: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
